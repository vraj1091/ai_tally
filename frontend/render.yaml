# Render.com Frontend Deployment Configuration
services:
  - type: web
    name: ai-tally-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://vraj1091-ai-tally-backend.hf.space
