<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI Tally Assistant - Intelligent Financial Analytics" />
    <title>AI Tally Assistant</title>
    <base href="/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Fallback for React Router on static hosting
      if (window.location.pathname !== '/' && !window.location.pathname.match(/\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$/)) {
        // This will be handled by React Router, but ensure we're on the right base
        if (!document.getElementById('root').innerHTML) {
          window.location.href = '/';
        }
      }
    </script>
  </body>
</html>
