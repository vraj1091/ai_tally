<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- OPTION 5: ULTRA MINIMAL - ABSTRACT PULSE/HEARTBEAT -->
  <defs>
    <linearGradient id="grad5a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <filter id="s5">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-opacity="0.25"/>
    </filter>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Clean circle background -->
  <circle cx="100" cy="100" r="88" fill="url(#grad5a)" filter="url(#s5)"/>
  
  <!-- Subtle inner circle -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
  
  <!-- Analytics pulse line - the hero element -->
  <path d="M 30 100 
           L 55 100 
           L 65 100 
           L 75 70 
           L 85 130 
           L 95 60 
           L 105 140 
           L 115 80 
           L 125 100 
           L 135 100 
           L 170 100" 
        fill="none" 
        stroke="white" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow5)"/>
  
  <!-- Peak indicator -->
  <circle cx="95" cy="60" r="6" fill="#10b981" filter="url(#glow5)"/>
  
  <!-- Subtle horizontal lines for context -->
  <line x1="40" y1="75" x2="160" y2="75" stroke="white" stroke-width="1" opacity="0.1"/>
  <line x1="40" y1="125" x2="160" y2="125" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>
