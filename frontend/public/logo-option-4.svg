<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- OPTION 4: MODERN SPLIT SQUARE WITH CHART -->
  <defs>
    <linearGradient id="grad4a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="grad4b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="s4">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-opacity="0.22"/>
    </filter>
  </defs>
  
  <!-- Left half -->
  <path d="M 20 45 Q 20 20 45 20 L 95 20 L 95 180 L 45 180 Q 20 180 20 155 Z" 
        fill="url(#grad4a)" filter="url(#s4)"/>
  
  <!-- Right half -->
  <path d="M 105 20 L 155 20 Q 180 20 180 45 L 180 155 Q 180 180 155 180 L 105 180 Z" 
        fill="url(#grad4b)" filter="url(#s4)"/>
  
  <!-- Left side - Simple bars -->
  <g transform="translate(35, 60)">
    <rect x="0" y="60" width="14" height="50" rx="4" fill="white" opacity="0.5"/>
    <rect x="20" y="40" width="14" height="70" rx="4" fill="white" opacity="0.7"/>
    <rect x="40" y="20" width="14" height="90" rx="4" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Right side - Trend line -->
  <g transform="translate(110, 60)">
    <path d="M 5 90 Q 25 70 35 50 T 60 20" 
          fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <circle cx="60" cy="20" r="8" fill="white"/>
    <circle cx="60" cy="20" r="4" fill="#10b981"/>
  </g>
  
  <!-- Center divider accent -->
  <line x1="100" y1="40" x2="100" y2="160" stroke="white" stroke-width="2" opacity="0.3"/>
</svg>
