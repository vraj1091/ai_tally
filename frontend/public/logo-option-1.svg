<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- OPTION 1: MINIMAL ABSTRACT "T" WITH RISING BARS -->
  <defs>
    <linearGradient id="grad1a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="s1">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Clean rounded square background -->
  <rect x="15" y="15" width="170" height="170" rx="38" fill="url(#grad1a)" filter="url(#s1)"/>
  
  <!-- Subtle inner glow -->
  <rect x="25" y="25" width="150" height="150" rx="30" fill="white" opacity="0.08"/>
  
  <!-- Abstract "T" formed by bars - Simple & Clean -->
  <g transform="translate(45, 50)">
    <!-- Horizontal bar of T -->
    <rect x="0" y="0" width="110" height="18" rx="9" fill="white"/>
    
    <!-- Vertical rising bars (forming stem of T + analytics) -->
    <rect x="10" y="30" width="18" height="55" rx="9" fill="white" opacity="0.5"/>
    <rect x="36" y="30" width="18" height="70" rx="9" fill="white" opacity="0.7"/>
    <rect x="62" y="30" width="18" height="85" rx="9" fill="white" opacity="0.9"/>
    <rect x="88" y="30" width="18" height="65" rx="9" fill="white" opacity="0.6"/>
  </g>
  
  <!-- Small accent dot -->
  <circle cx="165" cy="45" r="8" fill="#10b981"/>
</svg>
