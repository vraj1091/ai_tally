<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Advanced Gradients matching your theme -->
  <defs>
    <!-- Main Background Gradient - Your Primary Colors -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent Gradient - Lighter Primary -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold Gradient for Pro Badge -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.4"/>
    </filter>
    
    <!-- Inner Shadow -->
    <filter id="innerShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Glow Circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bgGradient)" opacity="0.2" filter="url(#glow)"/>
  
  <!-- Main Circle Background -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Inner Circle for Depth -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
  
  <!-- 3D Dashboard Grid with Perspective -->
  <g transform="translate(40, 40)">
    <!-- Back Layer (Depth) -->
    <g opacity="0.3">
      <rect x="3" y="3" width="28" height="28" rx="5" fill="white" opacity="0.5"/>
      <rect x="43" y="3" width="28" height="28" rx="5" fill="white" opacity="0.5"/>
      <rect x="83" y="3" width="28" height="28" rx="5" fill="white" opacity="0.5"/>
      <rect x="3" y="43" width="28" height="28" rx="5" fill="white" opacity="0.5"/>
      <rect x="43" y="43" width="28" height="28" rx="5" fill="white" opacity="0.5"/>
      <rect x="83" y="43" width="28" height="28" rx="5" fill="white" opacity="0.5"/>
      <rect x="3" y="83" width="28" height="28" rx="5" fill="white" opacity="0.5"/>
      <rect x="43" y="83" width="28" height="28" rx="5" fill="white" opacity="0.5"/>
      <rect x="83" y="83" width="28" height="28" rx="5" fill="white" opacity="0.5"/>
    </g>
    
    <!-- Front Layer -->
    <g filter="url(#innerShadow)">
      <!-- Top Row -->
      <rect x="0" y="0" width="28" height="28" rx="5" fill="white" opacity="0.95"/>
      <rect x="40" y="0" width="28" height="28" rx="5" fill="white" opacity="0.95"/>
      <rect x="80" y="0" width="28" height="28" rx="5" fill="white" opacity="0.95"/>
      
      <!-- Middle Row -->
      <rect x="0" y="40" width="28" height="28" rx="5" fill="white" opacity="0.95"/>
      <!-- Center highlight with your primary color -->
      <rect x="40" y="40" width="28" height="28" rx="5" fill="url(#accentGradient)" filter="url(#glow)"/>
      <rect x="80" y="40" width="28" height="28" rx="5" fill="white" opacity="0.95"/>
      
      <!-- Bottom Row -->
      <rect x="0" y="80" width="28" height="28" rx="5" fill="white" opacity="0.95"/>
      <rect x="40" y="80" width="28" height="28" rx="5" fill="white" opacity="0.95"/>
      <rect x="80" y="80" width="28" height="28" rx="5" fill="white" opacity="0.95"/>
    </g>
    
    <!-- Advanced Analytics Chart Overlay -->
    <g opacity="0.9">
      <!-- Area Fill -->
      <path d="M 8 35 L 20 25 L 35 30 L 54 50 L 70 40 L 90 20 L 105 25 L 105 110 L 8 110 Z" 
            fill="url(#accentGradient)" 
            opacity="0.2"/>
      
      <!-- Main Line -->
      <path d="M 8 35 L 20 25 L 35 30 L 54 50 L 70 40 L 90 20 L 105 25" 
            stroke="url(#accentGradient)" 
            stroke-width="4" 
            fill="none" 
            stroke-linecap="round"
            stroke-linejoin="round"
            filter="url(#glow)"/>
      
      <!-- Data Points with Glow - Using your primary colors -->
      <circle cx="8" cy="35" r="4" fill="#4f46e5" filter="url(#glow)"/>
      <circle cx="20" cy="25" r="4" fill="#4f46e5" filter="url(#glow)"/>
      <circle cx="35" cy="30" r="4" fill="#4f46e5" filter="url(#glow)"/>
      <circle cx="54" cy="50" r="4" fill="#6366f1" filter="url(#glow)"/>
      <circle cx="70" cy="40" r="4" fill="#6366f1" filter="url(#glow)"/>
      <circle cx="90" cy="20" r="4" fill="#6366f1" filter="url(#glow)"/>
      <circle cx="105" cy="25" r="4" fill="#6366f1" filter="url(#glow)"/>
      
      <!-- Inner Circles for Depth -->
      <circle cx="8" cy="35" r="2" fill="white"/>
      <circle cx="20" cy="25" r="2" fill="white"/>
      <circle cx="35" cy="30" r="2" fill="white"/>
      <circle cx="54" cy="50" r="2" fill="white"/>
      <circle cx="70" cy="40" r="2" fill="white"/>
      <circle cx="90" cy="20" r="2" fill="white"/>
      <circle cx="105" cy="25" r="2" fill="white"/>
    </g>
    
    <!-- AI Sparkle Effect -->
    <g opacity="0.8">
      <path d="M 95 15 L 97 17 L 95 19 L 93 17 Z" fill="white" filter="url(#glow)"/>
      <path d="M 105 30 L 107 32 L 105 34 L 103 32 Z" fill="white" filter="url(#glow)"/>
      <path d="M 15 90 L 17 92 L 15 94 L 13 92 Z" fill="white" filter="url(#glow)"/>
    </g>
  </g>
  
  <!-- Premium PRO Badge with 3D Effect -->
  <g transform="translate(130, 25)">
    <!-- Badge Shadow -->
    <rect x="2" y="2" width="55" height="24" rx="12" fill="black" opacity="0.3"/>
    <!-- Badge Background -->
    <rect x="0" y="0" width="55" height="24" rx="12" fill="url(#goldGradient)" filter="url(#shadow)"/>
    <!-- Badge Highlight -->
    <rect x="0" y="0" width="55" height="12" rx="12" fill="white" opacity="0.2"/>
    <!-- Badge Text -->
    <text x="27.5" y="16" font-family="Arial, sans-serif" font-size="13" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">PRO</text>
  </g>
  
  <!-- Subtle Ring Animation Indicator -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="white" stroke-width="1" opacity="0.2" stroke-dasharray="5,5">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 100 100"
      to="360 100 100"
      dur="20s"
      repeatCount="indefinite"/>
  </circle>
</svg>
