<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- OPTION 3: STACKED LAYERS / DASHBOARD CARDS -->
  <defs>
    <linearGradient id="grad3a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="grad3b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="s3">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background card (deepest) -->
  <rect x="35" y="25" width="130" height="90" rx="16" fill="url(#grad3b)" opacity="0.5" filter="url(#s3)"/>
  
  <!-- Middle card -->
  <rect x="25" y="50" width="150" height="100" rx="18" fill="url(#grad3b)" opacity="0.75" filter="url(#s3)"/>
  
  <!-- Front card (main) -->
  <rect x="15" y="75" width="170" height="110" rx="20" fill="url(#grad3a)" filter="url(#s3)"/>
  
  <!-- Content on front card -->
  <g transform="translate(35, 95)">
    <!-- Mini chart bars -->
    <rect x="0" y="45" width="22" height="35" rx="4" fill="white" opacity="0.4"/>
    <rect x="30" y="30" width="22" height="50" rx="4" fill="white" opacity="0.6"/>
    <rect x="60" y="15" width="22" height="65" rx="4" fill="white" opacity="0.9"/>
    <rect x="90" y="35" width="22" height="45" rx="4" fill="white" opacity="0.5"/>
    
    <!-- Trend line -->
    <path d="M 11 40 L 41 25 L 71 10 L 101 30" 
          fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Floating indicator -->
  <circle cx="165" cy="55" r="12" fill="#10b981"/>
  <path d="M 160 55 L 164 59 L 172 51" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
