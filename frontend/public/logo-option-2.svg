<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- OPTION 2: ELEGANT CIRCLE WITH UPWARD TREND -->
  <defs>
    <linearGradient id="grad2a" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="grad2b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="s2">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Main circle -->
  <circle cx="100" cy="100" r="85" fill="url(#grad2a)" filter="url(#s2)"/>
  
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="white" stroke-width="2" opacity="0.15"/>
  
  <!-- Elegant upward arrow/trend -->
  <g transform="translate(50, 55)">
    <!-- Rising path -->
    <path d="M 15 80 Q 35 75 50 55 T 85 25" 
          fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    
    <!-- Arrow head -->
    <polygon points="95,15 85,35 75,20" fill="white"/>
  </g>
  
  <!-- Three dots representing data points -->
  <circle cx="65" cy="135" r="6" fill="white" opacity="0.6"/>
  <circle cx="100" cy="110" r="6" fill="white" opacity="0.8"/>
  <circle cx="135" cy="80" r="8" fill="url(#grad2b)"/>
</svg>
